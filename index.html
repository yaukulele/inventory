:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--blue:#2563eb;--blue-light:#eff6ff;--green:#16a34a;--orange:#ea580c;--red:#dc2626;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Sans TC',system-ui,sans-serif;color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9px}
select option{background:#fff;color:#1e293b}input::placeholder{color:#94a3b8}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ipt{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.ipt:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.row{display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid #f1f5f9}
.row:last-child{border-bottom:none}
.circle-btn{width:36px;height:36px;border-radius:50%;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;touch-action:manipulation}
.circle-btn:active{transform:scale(.9)}
.modal-bg{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
.modal-box{position:relative;background:#fff;border-radius:18px;padding:20px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(37,99,235,.3);z-index:9999;animation:toastIn .3s ease;white-space:nowrap}
.tag-btn{padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1.5px solid var(--border);background:#fff;color:var(--sub);touch-action:manipulation}
.tag-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.num-btn{padding:12px 0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:#fff;color:var(--sub);transition:all .12s;touch-action:manipulation}
.num-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.num-btn:disabled{opacity:.25;cursor:default}
.stat-card{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.tab-btn{padding:11px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--sub);border-bottom:2.5px solid transparent;transition:all .15s;touch-action:manipulation}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.brand-hdr{display:flex;align-items:center;gap:8px;padding:14px 14px;cursor:pointer;user-select:none;border-bottom:1px solid #f1f5f9}
.cat-hdr{display:flex;align-items:center;gap:6px;padding:10px 14px 10px 28px;background:#f8fafc;border-bottom:1px solid #f1f5f9;cursor:pointer;user-select:none}
.day-header{padding:10px 14px;background:var(--blue-light);border-bottom:1px solid #dbeafe;font-size:13px;font-weight:700;color:var(--blue);display:flex;justify-content:space-between}
.export-box{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:14px;white-space:pre-wrap;font-size:12px;color:var(--sub);max-height:60vh;overflow-y:auto;font-family:'Noto Sans TC',monospace;line-height:1.6}
[draggable]{cursor:grab}[draggable]:active{cursor:grabbing}
.zl-box{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;color:var(--sub);cursor:pointer;white-space:nowrap;font-weight:500}
.zl-box input{accent-color:var(--blue);width:18px;height:18px;margin:0}
@media(max-width:480px){
  .stat-card{padding:8px 6px}.stat-card .val{font-size:16px}
  .modal-box{padding:16px;border-radius:14px}
  .row{gap:4px;padding:9px 10px}
  .circle-btn{width:34px;height:34px;font-size:15px}
  .tab-btn{padding:11px 10px;font-size:12px}
}
@media(max-width:360px){
  .circle-btn{width:32px;height:32px}
  .row{gap:3px;padding:8px 8px}
}
.hdr-btn-export .icon{display:none}
@media(max-width:400px){
  .hdr-btn-export .lbl{display:none}
  .hdr-btn-export .icon{display:inline}
}
header{padding-top:max(10px,env(safe-area-inset-top)) !important}
</style>

    const existNames=new Set(S.items.map(x=>x.b+"|"+x.n));

// Atomic per-item transaction — prevents concurrent writes from clobbering each other
function fbTxItem(id,updater){return new Promise((resolve,reject)=>{let missing=false;dbI.transaction(cur=>{missing=false;if(!Array.isArray(cur))return cur;const idx=cur.findIndex(x=>x&&x.id===id);if(idx<0){missing=true;return cur;}const r=updater(cur[idx]);if(r===undefined)return undefined;cur[idx]=r;return cur;},(err,committed,snap)=>{if(err)return reject(err);resolve({committed:committed&&!missing,missing,arr:snap&&snap.val()});},false);});}
function fbAddItemTx(it){return new Promise((resolve,reject)=>{dbI.transaction(cur=>{const arr=Array.isArray(cur)?cur:[];if(arr.some(x=>x&&x.id===it.id))return cur;return[...arr,it];},(err,committed,snap)=>{if(err)return reject(err);resolve({committed,arr:snap&&snap.val()});},false);});}
function fbDelItemTx(id){return new Promise((resolve,reject)=>{dbI.transaction(cur=>{if(!Array.isArray(cur))return cur;return cur.filter(x=>x&&x.id!==id);},(err,committed,snap)=>{if(err)return reject(err);resolve({committed,arr:snap&&snap.val()});},false);});}
// Track logs that we've added locally but not yet committed to remote — so the dbL listener doesn't briefly drop them when it fires before our write lands.
// pushLogLocal adds the marker BEFORE the local S.logs push so even a listener firing during an `await` between push and appendLog can't wipe our entry.
const _pendingLogs=new Set();
function fbAppendLogTx(entry){return new Promise((resolve,reject)=>{dbL.transaction(cur=>{const arr=Array.isArray(cur)?cur:[];return[entry,...arr].slice(0,500);},(err,committed,snap)=>{if(err)return reject(err);resolve({committed,arr:snap&&snap.val()});},false);});}
function pushLogLocal(entry){_pendingLogs.add(entry.id);S.logs=[entry,...S.logs].slice(0,500);saveCache();}
function dropLogLocal(id){_pendingLogs.delete(id);S.logs=S.logs.filter(l=>l.id!==id);}
function appendLog(entry){return fbAppendLogTx(entry).catch(e=>console.error(e)).finally(()=>{_pendingLogs.delete(entry.id);});}
// catOrd: atomically set one key so concurrent drags from different users don't clobber each other
function fbSetOrdKey(key,value){return new Promise((resolve)=>{dbO.transaction(cur=>{const obj=(cur&&typeof cur==="object")?{...cur}:{};if(value===null)delete obj[key];else obj[key]=value;return obj;},(err,committed,snap)=>{if(!err&&snap&&snap.val()&&typeof snap.val()==="object")S.catOrd=snap.val();resolve();},false);});}

// Optimistic UI tracking — items currently in flight to Firebase
const _pendingItems=new Set();
const _pendingDeletes=new Set();

// Throttled render for listener-triggered updates — coalesces multi-user broadcasts within 50ms window
let _listenerRenderTimer=null;
function listenerRender(){if(_listenerRenderTimer)return;_listenerRenderTimer=setTimeout(()=>{_listenerRenderTimer=null;render();},50);}

// Real-time sync: listen for changes from other users
let fbListening=false;
function startRealtimeSync(){
  if(fbListening)return;fbListening=true;
  // Connection status — writes only reach Firebase when online
  // Toast on disconnect/reconnect — but skip the first ~3s of subscriber events so the initial connection handshake doesn't fire spurious notifications
  const _connStart=Date.now();
  let _hadOffline=false;
  db.ref(".info/connected").on("value",snap=>{
    const online=!!snap.val();if(S.online===online)return;S.online=online;
    const stable=(Date.now()-_connStart)>3000;
    if(!online)_hadOffline=true;
    if(stable){
      if(online&&_hadOffline){showToast("✅ 已重新連線，同步中…");_hadOffline=false;}
      else if(!online)showToast("⚠ 連線中斷，修改會排隊");
    }
    if(S.phase==="ready"&&!S.modal&&document.activeElement?.tagName!=="INPUT"&&document.activeElement?.tagName!=="TEXTAREA")listenerRender();
  });
  // Don't re-render if a modal is open or user is typing — prevents focus loss / mid-action UI jump
  const canRender=()=>!S.modal&&document.activeElement?.tagName!=="INPUT";
  dbI.on("value",snap=>{const remote=snap.val();if(!remote||!Array.isArray(remote)||!S.items)return;
    // Reconcile remote with optimistic state — preserve pending items, drop pending deletes
    let merged=remote.filter(x=>x);
    if(_pendingItems.size){
      merged=merged.map(r=>{if(_pendingItems.has(r.id)){const local=S.items.find(x=>x.id===r.id);if(local)return local;}return r;});
      const remoteIds=new Set(merged.map(x=>x.id));
      S.items.forEach(x=>{if(_pendingItems.has(x.id)&&!remoteIds.has(x.id))merged.push(x);});
    }
    if(_pendingDeletes.size)merged=merged.filter(x=>!_pendingDeletes.has(x.id));
    const sig=arr=>JSON.stringify(arr.map(x=>x&&[x.id,x.q,x.n,x.b,x.c,x.z,x.img||"",x.dsc||""]));
    const prev=sig(S.items),next=sig(merged);
    if(prev!==next){S.items=merged;S.lastSyncAt=Date.now();saveCache();if(canRender())listenerRender();}
  });
  dbL.limitToFirst(200).on("value",snap=>{const raw=snap.val();
    const remote=Array.isArray(raw)?raw:(raw&&typeof raw==="object"?Object.keys(raw).sort((a,b)=>+a-+b).map(k=>raw[k]):null);
    if(!remote||!Array.isArray(remote))return;
    let cleanRemote=remote.filter(x=>x);
    // Preserve any locally-added logs whose appendLog() hasn't yet committed — without this they briefly disappear from the UI between our local push and Firebase round-trip
    if(_pendingLogs.size){
      const remoteIds=new Set(cleanRemote.map(l=>l.id));
      const pendingLocal=S.logs.filter(l=>_pendingLogs.has(l.id)&&!remoteIds.has(l.id));
      if(pendingLocal.length)cleanRemote=[...pendingLocal,...cleanRemote].slice(0,500);
    }
    const prev=S.logs.length?S.logs[0].id:null;
    const next=cleanRemote.length?cleanRemote[0].id:null;
    if(prev!==next||cleanRemote.length!==S.logs.length){S.logs=cleanRemote;saveCache();if(canRender())listenerRender();}
  });
  // catOrd sync: when another user reorders, reflect it
  dbO.on("value",snap=>{const remote=snap.val();if(!remote||typeof remote!=="object")return;
    const prev=JSON.stringify(S.catOrd),next=JSON.stringify(remote);
    if(prev!==next){S.catOrd=remote;if(canRender())listenerRender();}
  });
}


async function doAction(type,it,qty,note){
  const back=S.modal&&S.modal.back||null;
  const amt=Math.max(type==="audit"?0:1,qty);
  const idx=S.items.findIndex(x=>x.id===it.id);
  if(idx<0){S.modal=back;showToast("⚠ 此品項已被刪除");render();return {ok:false};}
  const orig=S.items[idx],rq=orig.q||0;
  if(type==="out"&&rq<=0){S.modal=back;showToast("⚠ 庫存為 0，無法出貨");render();return {ok:false};}
  const oa=type==="out"?Math.min(rq,amt):amt;
  const optNq=type==="in"?rq+amt:type==="out"?Math.max(0,rq-oa):Math.max(0,amt);
  if(type==="audit"&&optNq===rq){S.modal=back;showToast("數量相同，無需盤點");render();return {ok:false};}
  // Optimistic: update locally, close modal, show toast — instant UI feedback
  _pendingItems.add(it.id);
  S.items=[...S.items.slice(0,idx),{...orig,q:optNq},...S.items.slice(idx+1)];
  const det=note?(note+(type==="in"?"+"+amt:type==="out"?"-"+oa:"")):(type==="in"?"+"+amt:type==="out"?"-"+oa:"盤點 "+rq+"→"+optNq);
  const logEntry={id:uid(),iid:it.id,u:S.user,t:ts(),a:type==="in"?"📥進貨":type==="out"?"📤出貨":"📋盤點",n:it.n,b:it.b,d:det,pq:rq,nq:optNq};
  pushLogLocal(logEntry);
  S.modal=back;
  const diff=optNq-rq;const diffStr=type==="audit"?(diff===0?"":" ("+(diff>0?"+":"")+diff+")"):"";
  try{navigator.vibrate&&navigator.vibrate(30);}catch(e){}
  // Undo only for in/out (where reverse action is unambiguous server-relative). Audit absolute-set has no clean inverse.
  // Undo flag prevents recursive undo (the "(撤銷)" action shouldn't itself offer another undo).
  const undoOpts=(!note||note.indexOf("(撤銷)")<0)&&(type==="in"||type==="out")?{
    label:"↶ 撤銷",
    fn:()=>{const opp=type==="in"?"out":"in";const cur=S.items.find(x=>x.id===it.id);if(!cur){showToast("⚠ 此品項已被刪除");return;}doAction(opp,cur,oa,"(撤銷)");}
  }:null;
  showToast((type==="in"?"📥":type==="out"?"📤":"📋")+" "+it.n+" "+rq+"→"+optNq+diffStr,undoOpts);
  render();
  // Background sync — relative for in/out (concurrent-safe), absolute for audit
  let serverRq=rq,serverNq=optNq,failReason=null;
  try{
    const tx=await fbTxItem(it.id,cur=>{
      serverRq=cur.q||0;
      if(type==="in"){serverNq=serverRq+amt;return{...cur,q:serverNq};}
      if(type==="out"){if(serverRq<=0)return undefined;const o=Math.min(serverRq,amt);serverNq=Math.max(0,serverRq-o);return{...cur,q:serverNq};}
      serverNq=Math.max(0,amt);return{...cur,q:serverNq};
    });

function normalizeImgUrl(url){
  if(!url)return "";
  url=url.trim();
  // Google Drive: file/d/{id}/view, open?id={id}, /uc?export=view&id={id} → lh3 direct
  const gdMatch=url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?(?:[^&]*&)*id=)([A-Za-z0-9_-]{20,})/);
  if(gdMatch)return "https://lh3.googleusercontent.com/d/"+gdMatch[1]+"=w800";
  // imgur share page → i.imgur direct
  const imgurMatch=url.match(/^https?:\/\/(?:www\.)?imgur\.com\/([A-Za-z0-9]{5,7})(?:[?#].*)?$/);
  if(imgurMatch)return "https://i.imgur.com/"+imgurMatch[1]+".jpg";
  return url;
}

async function doUpdateMeta(id,patch){

      const changes=[];
      if(beforeFields.n!==item.n)changes.push("改名「"+beforeFields.n+"」→「"+item.n+"」");
      if(beforeFields.b!==item.b)changes.push("改品牌「"+beforeFields.b+"」→「"+item.b+"」");
      if(beforeFields.c!==item.c)changes.push("改分類「"+beforeFields.c+"」→「"+item.c+"」");

      }
    }
  }

}

// Optional undo: pass {label, fn} as second arg. Toast stays for 8s and shows a clickable button.
function showToast(m,undo){
  if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}
  if(_toastEl){_toastEl.remove();_toastEl=null;}
  const el=document.createElement("div");el.className="toast";

    btn.style.cssText="margin-left:6px;background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 12px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;";
    btn.onclick=ev=>{ev.stopPropagation();if(_toastEl===el){el.remove();_toastEl=null;}if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}try{undo.fn();}catch(e){console.error(e);}};
    el.appendChild(btn);
  }else{el.textContent=m;}
  document.body.appendChild(el);_toastEl=el;
  _toastTimer=setTimeout(()=>{if(_toastEl===el){el.remove();_toastEl=null;}_toastTimer=null;},undo&&undo.fn?8000:2000);
}

function highlightText(text,search){
  if(!search||!text)return [document.createTextNode(text||"")];
  const terms=search.toLowerCase().split(/\s+/).filter(Boolean).sort((a,b)=>b.length-a.length);
  if(!terms.length)return [document.createTextNode(text)];

  const marks=[];let i=0;
  while(i<text.length){let best=null;for(const t of terms){const j=lc.indexOf(t,i);if(j>=0&&(best===null||j<best.j||(j===best.j&&t.length>best.len))){best={j,len:t.length};}}if(!best)break;marks.push(best);i=best.j+best.len;}
  if(!marks.length)return [document.createTextNode(text)];
  const nodes=[];let p=0;marks.forEach(m=>{if(m.j>p)nodes.push(document.createTextNode(text.slice(p,m.j)));nodes.push(h("mark",{style:{background:"#fef08a",color:"var(--text)",padding:"0 2px",borderRadius:"3px"}},text.slice(m.j,m.j+m.len)));p=m.j+m.len;});if(p<text.length)nodes.push(document.createTextNode(text.slice(p)));
  return nodes;
}

function genExportText(zone,selDate){
  const today=new Date();const td=today.getFullYear()+"/"+String(today.getMonth()+1).padStart(2,"0")+"/"+String(today.getDate()).padStart(2,"0");
  // Use selected date or today
  const targetDate=selDate?selDate.replace(/-/g,"/"):td;
  const dlabel=targetDate.replace(/^\d{4}\//,"");
  let all="";
  // Filter logs to this zone. Match by iid where available so duplicate names across zones don't cross-contaminate
  // (e.g. STAGEPAS 100BTR exists in store, STAGEPAS 100BTR(倉) in warehouse — no overlap; but custom-added duplicates would).
  const zoneIds=new Set(S.items.filter(x=>(x.z||"店內")===zone).map(x=>x.id));
  const zoneNames=new Set(S.items.filter(x=>(x.z||"店內")===zone).map(x=>x.n));
  const inZone=l=>l.iid?zoneIds.has(l.iid):zoneNames.has(l.n);
  // Logs for selected date, filtered by zone
  const inLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&((l.a||"").includes("進貨")||(l.a||"").includes("➕")));
  const outLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&(l.a||"").includes("出貨"));
  const auLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&(l.a||"").includes("盤點"));
  if(inLogs.length){all+=dlabel+" 進貨\n==================\n";inLogs.forEach(l=>{const tag=(l.a||"").includes("➕")?"新增":"";all+=l.n+" "+(tag||(l.d||""))+" "+l.pq+"→"+l.nq+" ("+l.u+")\n";});all+="\n";}
  if(outLogs.length){all+=dlabel+" 出貨\n==================\n";outLogs.forEach(l=>{all+=l.n+" "+(l.d||"")+" "+l.pq+"→"+l.nq+" ("+l.u+")\n";});all+="\n";}
  if(auLogs.length){all+=dlabel+" 盤點\n==================\n";auLogs.forEach(l=>{all+=l.n+" "+l.pq+"→"+l.nq+" ("+l.u+")\n";});all+="\n";}
  // Stock report
  const zoneItems=S.items.filter(x=>(x.z||"店內")===zone);
  if(zone==="倉庫"){
    const brands=[...new Set(zoneItems.map(x=>x.b))].sort();
    brands.forEach(b=>{
      const bi=zoneItems.filter(x=>x.b===b);
      if(!bi.length)return;
      all+=dlabel+" "+b+" 倉庫庫存更新\n==================\n";
      const cg={};bi.forEach(x=>{if(!cg[x.c])cg[x.c]=[];cg[x.c].push(x);});
      Object.keys(cg).forEach(c=>{all+=c+"\n";cg[c].forEach(x=>all+=x.n+" x"+x.q+"\n");all+="——————————\n";});
      all+="\n";
    });
  }else{
    const tpls=[{t:"aNN 庫存更新",b:"aNueNue"},{t:"Veelah/Singer 庫存更新",b:["Veelah","Singer"]},{t:"D'a XS庫存更新",b:"D'Addario"},{t:"Elixir庫存更新",b:"Elixir"},{t:"NUX 庫存更新",b:"NUX"},{t:"音箱庫存更新",b:"其他音箱"},{t:"Yamaha 庫存更新",b:"Yamaha"}];
    const coveredBrands=new Set();tpls.forEach(tpl=>{const bs=Array.isArray(tpl.b)?tpl.b:[tpl.b];bs.forEach(b=>coveredBrands.add(b));});
    tpls.forEach(tpl=>{const bs=Array.isArray(tpl.b)?tpl.b:[tpl.b];const fi=zoneItems.filter(x=>bs.includes(x.b));if(!fi.length)return;all+=dlabel+" "+tpl.t+"\n==================\n";const g={};fi.forEach(x=>{if(!g[x.c])g[x.c]=[];g[x.c].push(x);});Object.keys(g).forEach(c=>{all+=c+"\n";g[c].forEach(x=>all+=x.n+" x"+x.q+"\n");all+="——————————\n";});all+="\n";});
    // Fallback: any brand not covered by tpls
    const otherBrands=[...new Set(zoneItems.map(x=>x.b).filter(b=>!coveredBrands.has(b)))].sort();
    otherBrands.forEach(b=>{const fi=zoneItems.filter(x=>x.b===b);if(!fi.length)return;all+=dlabel+" "+b+" 庫存更新\n==================\n";const g={};fi.forEach(x=>{if(!g[x.c])g[x.c]=[];g[x.c].push(x);});Object.keys(g).forEach(c=>{all+=c+"\n";g[c].forEach(x=>all+=x.n+" x"+x.q+"\n");all+="——————————\n";});all+="\n";});
  }
  return all.trim();
}

        ));});
    });
    root.appendChild(h("div",{className:"modal-bg"},h("div",{className:"modal-overlay",onClick:()=>{S.modal=null;render();}}),box));
  }
  return root;
}

let _bodyLockY=0;
function lockBody(){if(document.body.dataset.locked==="1")return;_bodyLockY=window.scrollY||document.documentElement.scrollTop||0;document.body.dataset.locked="1";document.body.style.position="fixed";document.body.style.top=(-_bodyLockY)+"px";document.body.style.width="100%";document.body.style.overflow="hidden";}
function unlockBody(){if(document.body.dataset.locked!=="1")return;document.body.dataset.locked="";document.body.style.position="";document.body.style.top="";document.body.style.width="";document.body.style.overflow="";window.scrollTo(0,_bodyLockY);}
// Coalesce multiple sync render() calls into one — saves redundant rebuilds when listeners fire together
let _renderQueued=false;
function render(){if(_renderQueued)return;_renderQueued=true;queueMicrotask(()=>{_renderQueued=false;_render();});}
function _render(){const a=document.getElementById("app");const wasLocked=document.body.dataset.locked==="1";const sy=wasLocked?_bodyLockY:(window.scrollY||document.documentElement.scrollTop||0);const skipRestore=S._skipScrollRestore;S._skipScrollRestore=false;a.innerHTML="";if(S.phase==="login")a.appendChild(renderLogin());else if(S.phase==="loading"||!S.items)a.appendChild(renderLoading());else a.appendChild(renderMain());if(S.modal){if(!wasLocked){_bodyLockY=sy;lockBody();}}else{if(wasLocked)unlockBody();if(skipRestore)requestAnimationFrame(()=>window.scrollTo(0,0));else if(sy>0)requestAnimationFrame(()=>window.scrollTo(0,sy));}}
// Global keyboard shortcuts. Esc closes modal; '/' focuses search; 'n' opens add modal.
// All shortcuts are skipped while user is typing in an input/textarea so nothing fires from a passing keystroke.
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&S.modal){if(S.modal.t==="detail"&&S.modal.edit)return;S.modal=S.modal.back||null;render();return;}
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const tag=e.target&&e.target.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||tag==="BUTTON")return;
  if(e.target&&e.target.isContentEditable)return;
  if(S.phase!=="ready"||S.modal)return;
  if(e.key==="/"){const sb=document.getElementById("searchBox");if(sb){e.preventDefault();sb.focus();sb.select();}}
  else if((e.key==="n"||e.key==="N")&&!isPreview()){e.preventDefault();S.modal={t:"add"};render();}
});
// Refresh sync label without rebuilding DOM — full render every minute thrashes input focus, scrolling state, etc.
setInterval(()=>{
  if(S.phase!=="ready"||document.hidden)return;
  const el=document.getElementById("syncLabel");
  if(!el||!S.lastSyncAt)return;
  const diffSec=Math.floor((Date.now()-S.lastSyncAt)/1000);
  let label;
  if(diffSec<10)label="剛剛";
  else if(diffSec<60)label=diffSec+"秒前";
  else if(diffSec<3600)label=Math.floor(diffSec/60)+"分前";
  else if(diffSec<86400)label=Math.floor(diffSec/3600)+"時前";
  else label=Math.floor(diffSec/86400)+"天前";
  if(el.textContent!==label)el.textContent=label;
  el.style.color=diffSec>3600?"var(--orange)":"var(--sub)";
},30000);
render();
</script>
