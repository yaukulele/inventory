// ═══ Firebase read/write ═══
async function fbLoad(){
  try{
    // Add timeout - if Firebase doesn't respond in 8 seconds, use default data
    const timeout=ms=>new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms));
    const[iSnap,lSnap,oSnap]=await Promise.race([
      Promise.all([dbItems.once("value"),dbLogs.once("value"),dbOrder.once("value")]),
      timeout(8000)
    ]);
    const i=iSnap.val();const l=lSnap.val();const o=oSnap.val();
    if(i&&Array.isArray(i)&&i.length>0)state.items=i;
    else{state.items=mkInit();dbItems.set(state.items);}
    state.logs=Array.isArray(l)?l:[];
    state.catOrd=(o&&typeof o==="object")?o:{};
  }catch(e){
    console.error("fbLoad error:",e);
    state.items=mkInit();state.logs=[];
    // Try to save initial data
    try{dbItems.set(state.items);}catch(e2){}
  }
}
function fbSaveItems(){dbItems.set(state.items).catch(e=>console.error("save items",e));}
function fbSaveLogs(){dbLogs.set(state.logs).catch(e=>console.error("save logs",e));}
function fbSaveOrder(){dbOrder.set(state.catOrd).catch(e=>console.error("save order",e));}

// ═══ Actions ═══
function doAction(type,it,qty,note){
  const cur=state.items.find(x=>x.id===it.id);if(!cur)return;
  const realQ=cur.q;const amt=Math.max(type==="audit"?0:1,qty);
  if(type==="out"&&realQ<=0)return;
  const outAmt=type==="out"?Math.min(realQ,amt):amt;

function h(tag,props,...ch){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el[k.toLowerCase()]=v;
    else if(k==="className")el.className=v;

    else el.setAttribute(k,v);

  return el;
}

      const bDiv=h("div",{style:{marginBottom:"8px"}});
      bDiv.appendChild(h("div",{className:"brand-hdr"+(bo?" open":""),style:{background:col+"10",border:"1px solid "+col+"25",borderRadius:bo?"10px 10px 0 0":"10px"},onClick:()=>{state.bOpen[bk]=!state.bOpen[bk];render();}},
        h("span",{style:{fontSize:"9px",color:col,transform:bo?"rotate(0)":"rotate(-90deg)",transition:"transform .12s",fontWeight:900,display:"inline-block"}},"▼"),
        h("span",{style:{fontSize:"14px",fontWeight:800,color:col}},b),
        h("span",{style:{marginLeft:"auto",fontSize:"11px",color:col+"99"}},bC+"項/"+bT)
      ));
      if(bo){
        const inner=h("div",{style:{border:"1px solid "+col+"15",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}});
        cats.forEach(({c,its})=>{
          const ck=bk+"|"+c;const co=state.cOpen[ck];const cT=its.reduce((s,x)=>s+x.q,0);
          inner.appendChild(h("div",{className:"cat-hdr",onClick:()=>{state.cOpen[ck]=!state.cOpen[ck];render();}},
            h("span",{style:{fontSize:"8px",color:"#475569",transform:co?"rotate(0)":"rotate(-90deg)",transition:"transform .1s",display:"inline-block"}},"▼"),
            h("span",{style:{fontSize:"11px",fontWeight:600,color:"#a78bfa"}},c),
            h("span",{style:{marginLeft:"auto",fontSize:"10px",color:"#475569"}},its.length+"/"+cT)
          ));
          if(co)its.forEach(it=>inner.appendChild(renderRow(it)));
        });
        bDiv.appendChild(inner);
      }
      content.appendChild(bDiv);
    });
    if(grouped.length===0)content.appendChild(h("div",{style:{textAlign:"center",padding:"30px",color:"#475569",fontSize:"13px"}},"無符合商品"));
  } else {
    // Logs
    const logBox=h("div",{style:{border:"1px solid #222839",borderRadius:"10px",overflow:"hidden"}});
    state.logs.slice(0,150).forEach((l,i)=>{
      logBox.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"7px 10px",fontSize:"11px",background:i%2?"transparent":"#12151e",borderBottom:"1px solid #222839"}},
        h("span",{},(l.a||"").slice(0,2)),
        h("div",{style:{flex:1,minWidth:0}},h("b",{style:{color:"#e2e8f0"}},l.n),l.d?h("span",{style:{color:"#475569",marginLeft:"4px",fontSize:"10px"}},l.d):null),
        h("span",{style:{fontSize:"10px",color:(l.nq||0)>(l.pq||0)?"#22c55e":(l.nq||0)<(l.pq||0)?"#ef4444":"#475569",fontWeight:600}},l.pq+"→"+l.nq),
        h("span",{style:{fontSize:"9px",color:"#475569"}},l.u+" "+l.t)
      ));
    });
    if(!state.logs.length)logBox.appendChild(h("div",{style:{padding:"24px",textAlign:"center",color:"#475569"}},"尚無紀錄"));
    content.appendChild(logBox);
  }
  root.appendChild(content);
  // Modal
  const actionM=renderActionModal();if(actionM)root.appendChild(actionM);
  const addM=renderAddModal();if(addM)root.appendChild(addM);
  // Toast
  if(state.toast)root.appendChild(h("div",{className:"toast"},state.toast));
  return root;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.phase==="login")app.appendChild(renderLogin());
  else if(state.phase==="loading"||!state.items)app.appendChild(renderLoading());
  else app.appendChild(renderMain());
}

render();
</script>
</body>
</html>
