<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--blue:#2563eb;--blue-light:#eff6ff;--green:#16a34a;--orange:#ea580c;--red:#dc2626;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Sans TC',system-ui,sans-serif;color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9px}
select option{background:#fff;color:#1e293b}input::placeholder{color:#94a3b8}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ipt{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.ipt:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f1f5f9}
.row:last-child{border-bottom:none}
.circle-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.circle-btn:active{transform:scale(.9)}
.modal-bg{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
.modal-box{position:relative;background:#fff;border-radius:18px;padding:24px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(37,99,235,.3);z-index:9999;animation:toastIn .3s ease;white-space:nowrap}
.tag-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1.5px solid var(--border);background:#fff;color:var(--sub)}
.tag-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.num-btn{padding:10px 0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:#fff;color:var(--sub);transition:all .12s}
.num-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.num-btn:disabled{opacity:.25;cursor:default}
.stat-card{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.tab-btn{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--sub);border-bottom:2.5px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.brand-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none;border-bottom:1px solid #f1f5f9}
.cat-hdr{display:flex;align-items:center;gap:6px;padding:8px 14px 8px 28px;background:#f8fafc;border-bottom:1px solid #f1f5f9;cursor:pointer;user-select:none}
.day-header{padding:10px 14px;background:var(--blue-light);border-bottom:1px solid #dbeafe;font-size:13px;font-weight:700;color:var(--blue);display:flex;justify-content:space-between}
.export-box{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:14px;white-space:pre-wrap;font-size:12px;color:var(--sub);max-height:60vh;overflow-y:auto;font-family:'Noto Sans TC',monospace;line-height:1.6}
[draggable]{cursor:grab}[draggable]:active{cursor:grabbing}
@media(max-width:480px){.stat-card{padding:8px 6px}.stat-card .val{font-size:16px}}
</style>
</head>

// Real-time sync: listen for changes from other users
let fbListening=false;
function startRealtimeSync(){
  if(fbListening)return;fbListening=true;
  dbI.on("value",snap=>{const remote=snap.val();if(!remote||!Array.isArray(remote)||!S.items)return;
    // Merge: keep all remote items, add any local-only items (just added by this user)
    const remoteIds=new Set(remote.map(x=>x.id));const localOnly=S.items.filter(x=>!remoteIds.has(x.id));
    if(localOnly.length>0){S.items=[...remote,...localOnly];dbI.set(S.items);}
    else if(remote.length!==S.items.length||JSON.stringify(remote.map(x=>x.q))!==JSON.stringify(S.items.map(x=>x.q))){S.items=remote;render();}
  });
}

// Touch drag helper for mobile
function addTouchDrag(el,onStart,onOver,onDrop){
  let startY=0,clone=null,moved=false;
  el.addEventListener("touchstart",e=>{
    if(e.target.closest(".circle-btn"))return;
    startY=e.touches[0].clientY;moved=false;
    setTimeout(()=>{if(!moved){
      clone=el.cloneNode(true);clone.style.cssText="position:fixed;left:0;right:0;z-index:999;opacity:0.8;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.2);";
      clone.style.top=el.getBoundingClientRect().top+"px";
      document.body.appendChild(clone);el.style.opacity="0.3";
      onStart();
    }},300);
  },{passive:true});
  el.addEventListener("touchmove",e=>{
    if(Math.abs(e.touches[0].clientY-startY)>5)moved=true;
    if(!clone)return;e.preventDefault();
    clone.style.top=(e.touches[0].clientY-30)+"px";
    const target=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
    if(target)onOver(target);
  },{passive:false});
  el.addEventListener("touchend",e=>{
    if(clone){clone.remove();clone=null;el.style.opacity="1";
      const target=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      if(target)onDrop(target);
    }
  });
}

function genExportText(zone,selDate){
  const today=new Date();const td=today.getFullYear()+"/"+String(today.getMonth()+1).padStart(2,"0")+"/"+String(today.getDate()).padStart(2,"0");
  // Use selected date or today
  const targetDate=selDate?selDate.replace(/-/g,"/"):td;
  const dlabel=targetDate.replace(/^\d{4}\//,"");
  let all="";
  // Get item names in this zone to filter logs
  const zoneNames=new Set(S.items.filter(x=>(x.z||"店內")===zone).map(x=>x.n));
  const inZone=l=>zoneNames.has(l.n);
  // Logs for selected date, filtered by zone
  const inLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&((l.a||"").includes("進貨")||(l.a||"").includes("➕")));
  const outLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&(l.a||"").includes("出貨"));
  const auLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&(l.a||"").includes("盤點"));
  if(inLogs.length){all+=dlabel+" 進貨\n==================\n";inLogs.forEach(l=>{const tag=(l.a||"").includes("➕")?"新增":"";all+=l.n+" "+(tag||(l.d||""))+" "+l.pq+"→"+l.nq+" ("+l.u+")\n";});all+="\n";}
  if(outLogs.length){all+=dlabel+" 出貨\n==================\n";outLogs.forEach(l=>{all+=l.n+" "+(l.d||"")+" "+l.pq+"→"+l.nq+" ("+l.u+")\n";});all+="\n";}
  if(auLogs.length){all+=dlabel+" 盤點\n==================\n";auLogs.forEach(l=>{all+=l.n+" "+l.pq+"→"+l.nq+" ("+l.u+")\n";});all+="\n";}
  // Stock report
  const zoneItems=S.items.filter(x=>(x.z||"店內")===zone);
  if(zone==="倉庫"){
    const brands=[...new Set(zoneItems.map(x=>x.b))].sort();
    brands.forEach(b=>{

      all+="\n";
    });
  }else{
    const tpls=[{t:"aNN 庫存更新",b:"aNueNue"},{t:"Veelah/Singer 庫存更新",b:["Veelah","Singer"]},{t:"D'a XS庫存更新",b:"D'Addario"},{t:"Elixir庫存更新",b:"Elixir"},{t:"NUX 庫存更新",b:"NUX"},{t:"音箱庫存更新",b:"其他音箱"},{t:"Yamaha 庫存更新",b:"Yamaha"}];
    tpls.forEach(tpl=>{const bs=Array.isArray(tpl.b)?tpl.b:[tpl.b];const fi=zoneItems.filter(x=>bs.includes(x.b));if(!fi.length)return;all+=dlabel+" "+tpl.t+"\n==================\n";const g={};fi.forEach(x=>{if(!g[x.c])g[x.c]=[];g[x.c].push(x);});Object.keys(g).forEach(c=>{all+=c+"\n";g[c].forEach(x=>all+=x.n+" x"+x.q+"\n");all+="——————————\n";});all+="\n";});
  }

}

    if(S.logDateFrom){const df=S.logDateFrom.replace(/-/g,"/");filteredLogs=filteredLogs.filter(l=>dateOnly(l.t)>=df);}
    if(S.logDateTo){const dt=S.logDateTo.replace(/-/g,"/");filteredLogs=filteredLogs.filter(l=>dateOnly(l.t)<=dt);}

    // Today's shipments (only show when no filters)
    if(!S.logSearch&&!S.logDateFrom&&!S.logDateTo){
      const now2=new Date();const today=now2.getFullYear()+"/"+String(now2.getMonth()+1).padStart(2,"0")+"/"+String(now2.getDate()).padStart(2,"0");
      const todayLogs=S.logs.filter(l=>dateOnly(l.t)===today&&(l.a||"").includes("出貨"));
      if(todayLogs.length){
        const todayCard=h("div",{className:"card",style:{marginBottom:"14px",border:"2px solid #dbeafe"}});
        todayCard.appendChild(h("div",{style:{padding:"12px 14px",background:"var(--blue-light)",borderBottom:"1px solid #dbeafe",display:"flex",justifyContent:"space-between",alignItems:"center"}},h("span",{style:{fontSize:"14px",fontWeight:700,color:"var(--blue)"}},"📦 今日出貨"),h("span",{style:{fontSize:"12px",color:"var(--blue)",fontWeight:600}},todayLogs.length+" 筆")));
        todayLogs.forEach(l=>{todayCard.appendChild(h("div",{className:"row"},h("div",{style:{flex:1}},h("b",{style:{fontSize:"13px"}},l.n),h("span",{style:{color:"var(--sub)",marginLeft:"6px",fontSize:"11px"}},l.d)),h("span",{style:{fontSize:"12px",color:"var(--red)",fontWeight:600}},l.pq+"→"+l.nq),h("span",{style:{fontSize:"10px",color:"var(--sub)",marginLeft:"4px"}},l.u)));});
        content.appendChild(todayCard);
      }
    }

    // Result count
    if(S.logSearch||S.logDateFrom||S.logDateTo){
      content.appendChild(h("div",{style:{fontSize:"12px",color:"var(--sub)",marginBottom:"8px",fontWeight:500}},"找到 "+filteredLogs.length+" 筆紀錄"));
    }

    // Logs grouped by date
    const byDate={};filteredLogs.slice(0,500).forEach(l=>{const d=dateOnly(l.t);if(!byDate[d])byDate[d]=[];byDate[d].push(l);});
    const logCard=h("div",{className:"card"});
    Object.keys(byDate).forEach(date=>{
      const dayLogs=byDate[date];
      const inC=dayLogs.filter(l=>(l.a||"").includes("進")).length;
      const outC=dayLogs.filter(l=>(l.a||"").includes("出")).length;
      const auC=dayLogs.filter(l=>(l.a||"").includes("盤")).length;
      logCard.appendChild(h("div",{className:"day-header"},h("span",{},date),h("span",{style:{fontWeight:500,fontSize:"11px"}},"進"+inC+" 出"+outC+(auC?" 盤"+auC:"")+" 共"+dayLogs.length+"筆")));
      dayLogs.forEach((l,i)=>{logCard.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"8px 14px",fontSize:"12px",background:i%2?"#fff":"#f8fafc",borderBottom:"1px solid #f1f5f9"}},h("span",{},(l.a||"").slice(0,2)),h("div",{style:{flex:1,minWidth:0}},h("b",{},l.n),l.d?h("span",{style:{color:"var(--sub)",marginLeft:"4px",fontSize:"11px"}},l.d):null),h("span",{style:{fontSize:"11px",color:(l.nq||0)>(l.pq||0)?"var(--green)":(l.nq||0)<(l.pq||0)?"var(--red)":"var(--sub)",fontWeight:600}},l.pq+"→"+l.nq),h("span",{style:{fontSize:"10px",color:"var(--sub)"}},l.u)));});
    });
    if(!filteredLogs.length)logCard.appendChild(h("div",{style:{padding:"30px",textAlign:"center",color:"var(--sub)"}},S.logSearch||S.logDateFrom||S.logDateTo?"沒有符合的紀錄":"尚無紀錄"));
    content.appendChild(logCard);
  }else if(S.tab==="stats"){
    // Monthly stats
    const now=new Date();const ym=now.getFullYear()+"/"+String(now.getMonth()+1).padStart(2,"0");
    const monthLogs=S.logs.filter(l=>(l.t||"").startsWith(ym));
    const mIn=monthLogs.filter(l=>(l.a||"").includes("進"));
    const mOut=monthLogs.filter(l=>(l.a||"").includes("出"));
    // Summary card
    const sumCard=h("div",{className:"card",style:{marginBottom:"14px",padding:"16px"}});
    sumCard.appendChild(h("div",{style:{fontSize:"15px",fontWeight:700,marginBottom:"12px"}},"📊 "+(now.getMonth()+1)+"月 統計"));
    sumCard.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}},
      h("div",{style:{textAlign:"center",padding:"10px",background:"#f0fdf4",borderRadius:"10px"}},h("div",{style:{fontSize:"10px",color:"var(--sub)"}},"進貨筆數"),h("div",{style:{fontSize:"22px",fontWeight:800,color:"var(--green)"}},String(mIn.length))),
      h("div",{style:{textAlign:"center",padding:"10px",background:"#fef2f2",borderRadius:"10px"}},h("div",{style:{fontSize:"10px",color:"var(--sub)"}},"出貨筆數"),h("div",{style:{fontSize:"22px",fontWeight:800,color:"var(--red)"}},String(mOut.length))),
      h("div",{style:{textAlign:"center",padding:"10px",background:"var(--blue-light)",borderRadius:"10px"}},h("div",{style:{fontSize:"10px",color:"var(--sub)"}},"總異動"),h("div",{style:{fontSize:"22px",fontWeight:800,color:"var(--blue)"}},String(monthLogs.length)))
    ));
    content.appendChild(sumCard);
    // Top out items
    const outMap={};mOut.forEach(l=>{const k=l.n;const qty=Math.abs((l.pq||0)-(l.nq||0));outMap[k]=(outMap[k]||0)+qty;});
    const topOut=Object.entries(outMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
    if(topOut.length){
      const topCard=h("div",{className:"card",style:{marginBottom:"14px"}});
      topCard.appendChild(h("div",{style:{padding:"12px 14px",borderBottom:"1px solid var(--border)",fontWeight:700,fontSize:"14px"}},"🔥 本月出貨排行"));
      topOut.forEach(([name,qty],i)=>{
        const maxQ=topOut[0][1];const pct=Math.round(qty/maxQ*100);
        topCard.appendChild(h("div",{style:{padding:"8px 14px",display:"flex",alignItems:"center",gap:"8px",borderBottom:"1px solid #f1f5f9"}},
          h("span",{style:{fontSize:"12px",fontWeight:700,color:i<3?"var(--red)":"var(--sub)",minWidth:"20px"}},String(i+1)),
          h("div",{style:{flex:1}},h("div",{style:{fontSize:"13px",fontWeight:600,marginBottom:"3px"}},name),h("div",{style:{height:"4px",borderRadius:"2px",background:"#f1f5f9"}},h("div",{style:{height:"4px",borderRadius:"2px",background:i<3?"var(--red)":"var(--blue)",width:pct+"%"}}))),
          h("span",{style:{fontSize:"14px",fontWeight:700,color:"var(--red)"}},String(qty))
        ));});
      content.appendChild(topCard);
    }
    // Top in items
    const inMap={};mIn.forEach(l=>{const k=l.n;const qty=Math.abs((l.nq||0)-(l.pq||0));inMap[k]=(inMap[k]||0)+qty;});
    const topIn=Object.entries(inMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
    if(topIn.length){
      const topInCard=h("div",{className:"card",style:{marginBottom:"14px"}});
      topInCard.appendChild(h("div",{style:{padding:"12px 14px",borderBottom:"1px solid var(--border)",fontWeight:700,fontSize:"14px"}},"📦 本月進貨排行"));
      topIn.forEach(([name,qty],i)=>{
        const maxQ=topIn[0][1];const pct=Math.round(qty/maxQ*100);
        topInCard.appendChild(h("div",{style:{padding:"8px 14px",display:"flex",alignItems:"center",gap:"8px",borderBottom:"1px solid #f1f5f9"}},
          h("span",{style:{fontSize:"12px",fontWeight:700,color:i<3?"var(--green)":"var(--sub)",minWidth:"20px"}},String(i+1)),
          h("div",{style:{flex:1}},h("div",{style:{fontSize:"13px",fontWeight:600,marginBottom:"3px"}},name),h("div",{style:{height:"4px",borderRadius:"2px",background:"#f1f5f9"}},h("div",{style:{height:"4px",borderRadius:"2px",background:i<3?"var(--green)":"var(--blue)",width:pct+"%"}}))),
          h("span",{style:{fontSize:"14px",fontWeight:700,color:"var(--green)"}},String(qty))
        ));});
      content.appendChild(topInCard);
    }
    if(!monthLogs.length)content.appendChild(h("div",{style:{textAlign:"center",padding:"40px",color:"var(--sub)"}},"本月尚無紀錄"));
  }
  root.appendChild(content);
  const am=renderActionModal();if(am)root.appendChild(am);
  const adm=renderAddModal();if(adm)root.appendChild(adm);
  const em=renderExportModal();if(em)root.appendChild(em);
  // Zero / Low stock modal
  if(S.modal&&(S.modal.t==="zero"||S.modal.t==="low")){
    const isZero=S.modal.t==="zero";const title=isZero?"🔴 零庫存清單（需補貨）":"🟠 低庫存清單（庫存≤2）";
    const list=(S.items||[]).filter(x=>x.z!=="倉庫"&&(isZero?x.q===0:(x.q>0&&x.q<=2)));
    const byBrand={};list.forEach(x=>{if(!byBrand[x.b])byBrand[x.b]=[];byBrand[x.b].push(x);});
    const box=h("div",{className:"modal-box",style:{maxWidth:"500px"}});
    box.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}},
      h("h3",{style:{fontSize:"16px",fontWeight:700}},title),
      h("button",{style:{background:"none",border:"none",color:"var(--sub)",cursor:"pointer",fontSize:"18px"},onClick:()=>{S.modal=null;render();}},"✕")));
    box.appendChild(h("div",{style:{fontSize:"13px",color:"var(--sub)",marginBottom:"12px",padding:"8px 12px",background:"#f8fafc",borderRadius:"8px"}},"共 "+list.length+" 項"));
    Object.keys(byBrand).sort().forEach(brand=>{
      const col=gc(brand);const items=byBrand[brand];
      box.appendChild(h("div",{style:{padding:"8px 12px",background:col+"10",borderRadius:"8px",marginBottom:"4px",fontWeight:700,fontSize:"13px",color:col,display:"flex",justifyContent:"space-between"}},brand,h("span",{style:{fontWeight:500,fontSize:"11px",color:"var(--sub)"}},items.length+"項")));
      items.forEach(it=>{
        box.appendChild(h("div",{style:{padding:"6px 12px 6px 24px",fontSize:"13px",display:"flex",alignItems:"center",gap:"6px",borderBottom:"1px solid #f1f5f9"}},
          h("span",{style:{flex:1}},it.n),
          h("span",{style:{color:isZero?"var(--red)":"var(--orange)",fontWeight:700,fontSize:"13px"}},String(it.q)),
          h("span",{style:{fontSize:"10px",color:"var(--sub)"}},it.c)
        ));});
    });
    root.appendChild(h("div",{className:"modal-bg"},h("div",{className:"modal-overlay",onClick:()=>{S.modal=null;render();}}),box));
  }
  if(S.toast)root.appendChild(h("div",{className:"toast"},S.toast));
  return root;
}

function render(){const a=document.getElementById("app");a.innerHTML="";if(S.phase==="login")a.appendChild(renderLogin());else if(S.phase==="loading"||!S.items)a.appendChild(renderLoading());else a.appendChild(renderMain());}
render();
</script>
</body>
</html>
