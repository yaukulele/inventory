*{box-sizing:border-box;margin:0;padding:0}

select option{background:#fff;color:#1e293b}input::placeholder{color:#94a3b8}

.ipt:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.circle-btn:active{transform:scale(.9)}
.modal-bg{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center}

.tag-btn{padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1.5px solid var(--border);background:#fff;color:var(--sub);touch-action:manipulation}
.tag-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.num-btn{padding:12px 0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:#fff;color:var(--sub);transition:all .12s;touch-action:manipulation}
.num-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.num-btn:disabled{opacity:.25;cursor:default}
.stat-card{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.tab-btn{padding:11px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--sub);border-bottom:2.5px solid transparent;transition:all .15s;touch-action:manipulation}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.brand-hdr{display:flex;align-items:center;gap:8px;padding:14px 14px;cursor:pointer;user-select:none;border-bottom:1px solid #f1f5f9;transition:background .1s}
.brand-hdr:active{background:#f8fafc}

.cat-hdr:active{background:#f1f5f9}
.tab-btn:active{color:var(--blue)}

      },(err,committed,snap)=>{const a=arrFromVal(snap&&snap.val());if(!err&&a)S.items=mergePending(a.filter(x=>x));resolve();},false);});
      console.log("Auto-injected via tx: "+allNew.length+" item(s) checked");

  else{await new Promise(resolve=>{dbI.transaction(cur=>{const arr=arrFromVal(cur);if(arr&&arr.length>0)return arr;return mkInit();},(err,committed,snap)=>{const a=arrFromVal(snap&&snap.val());if(!err&&a)S.items=a.filter(x=>x);else S.items=mkInit();resolve();},false);});}
  // Logs: clear old test logs once (version check). filter(x=>x) drops sparse-array nulls.

    // Original wipe behavior is preserved ONLY when items are empty too (truly first-ever load).
    const itemsCount=(i||[]).filter(x=>x).length;

      console.warn("Skipped log wipe вҖ” items present ("+itemsCount+"). Just stamped __ver.");
    }
  }
  // One-time migration: Yamaha йј“й…Қд»¶/йј“йҹіз®ұ вҶ’ "й…Қд»¶е°ҲеҚҖпјҲеҗ«йҹіз®ұпјү" brand
  if(!S.catOrd.__brandMigYamahaAcc){
    const migOk=await new Promise(resolve=>{dbI.transaction(cur=>{
      const arr=arrFromVal(cur);
      if(!arr)return cur;
      let changed=false;
      const next=arr.map(x=>{if(x&&x.b==="Yamaha"&&(x.c==="йј“й…Қд»¶"||x.c==="йј“йҹіз®ұ")){changed=true;return{...x,b:"й…Қд»¶е°ҲеҚҖпјҲеҗ«йҹіз®ұпјү"};}return x;});
      return changed?next:arr;
    },(err,committed,snap)=>{const a=arrFromVal(snap&&snap.val());if(!err&&a)S.items=mergePending(a.filter(x=>x));resolve(!err);},false);});
    // Only mark the migration done if it actually committed вҖ” otherwise we'd suppress future retries on a failed tx.
    if(migOk){await fbSetOrdKey("__brandMigYamahaAcc",true);console.log("Brand migration: Yamaha йј“й…Қд»¶/йј“йҹіз®ұ вҶ’ й…Қд»¶е°ҲеҚҖпјҲеҗ«йҹіз®ұпјү");}

// Atomic per-item transactions вҖ” prevents concurrent writes from clobbering each other.
// Updaters use arrFromVal so they keep working when Firebase returns the items path as an object (sparse array form).
function fbTxItem(id,updater){return new Promise((resolve,reject)=>{let missing=false;dbI.transaction(cur=>{missing=false;const arr=arrFromVal(cur);if(!arr)return cur;const idx=arr.findIndex(x=>x&&x.id===id);if(idx<0){missing=true;return arr;}const r=updater(arr[idx]);if(r===undefined)return undefined;arr[idx]=r;return arr;},(err,committed,snap)=>{if(err)return reject(err);resolve({committed:committed&&!missing,missing,arr:arrFromVal(snap&&snap.val())});},false);});}
function fbAddItemTx(it){return new Promise((resolve,reject)=>{dbI.transaction(cur=>{const arr=arrFromVal(cur)||[];if(arr.some(x=>x&&x.id===it.id))return arr;return[...arr,it];},(err,committed,snap)=>{if(err)return reject(err);resolve({committed,arr:arrFromVal(snap&&snap.val())});},false);});}
function fbDelItemTx(id){return new Promise((resolve,reject)=>{dbI.transaction(cur=>{const arr=arrFromVal(cur);if(!arr)return cur;return arr.filter(x=>x&&x.id!==id);},(err,committed,snap)=>{if(err)return reject(err);resolve({committed,arr:arrFromVal(snap&&snap.val())});},false);});}
// Track logs that we've added locally but not yet committed to remote вҖ” so the dbL listener doesn't briefly drop them when it fires before our write lands.
// pushLogLocal adds the marker BEFORE the local S.logs push so even a listener firing during an `await` between push and appendLog can't wipe our entry.
const _pendingLogs=new Set();
function fbAppendLogTx(entry){return new Promise((resolve,reject)=>{dbL.transaction(cur=>{const arr=arrFromVal(cur)||[];return[entry,...arr].slice(0,500);},(err,committed,snap)=>{if(err)return reject(err);resolve({committed,arr:arrFromVal(snap&&snap.val())});},false);});}
function pushLogLocal(entry){_pendingLogs.add(entry.id);S.logs=[entry,...S.logs].slice(0,500);saveCache();}
function dropLogLocal(id){_pendingLogs.delete(id);S.logs=S.logs.filter(l=>l.id!==id);}
function appendLog(entry){return fbAppendLogTx(entry).catch(e=>{console.error("appendLog failed:",e);showToast("вҡ  зҙҖйҢ„еҜ«е…ҘеӨұж•—пјҢеӢ•дҪңе·Із”ҹж•ҲдҪҶ log жІ’еҗҢжӯҘ");}).finally(()=>{_pendingLogs.delete(entry.id);});}
// catOrd: atomically set one key so concurrent drags from different users don't clobber each other
function fbSetOrdKey(key,value){return new Promise((resolve)=>{dbO.transaction(cur=>{const obj=(cur&&typeof cur==="object")?{...cur}:{};if(value===null)delete obj[key];else obj[key]=value;return obj;},(err,committed,snap)=>{if(err){console.error("fbSetOrdKey failed:",key,err);showToast("вҡ  жҺ’еәҸе„ІеӯҳеӨұж•—");}else if(snap&&snap.val()&&typeof snap.val()==="object")S.catOrd=snap.val();resolve();},false);});}

// User accounts. Plaintext passwords (admin needs to see them per user requirement). Seeded on first load if /inventory/users is empty.
async function fbLoadUsers(){

    const tm=ms=>new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),ms));
    const snap=await Promise.race([dbU.once("value"),tm(8000)]);

      const seed=Object.fromEntries(Object.entries(SEED_USERS).map(([k,v])=>[k,{...v,createdAt:Date.now()}]));
      await Promise.race([dbU.set(seed),tm(8000)]);

}

function fbDeleteUser(username){return new Promise(resolve=>{dbU.child(username).remove().then(()=>{if(S.users){const next={...S.users};delete next[username];S.users=next;}resolve(true);}).catch(e=>{console.error("fbDeleteUser failed:",e);showToast("вҡ  еҲӘйҷӨеёіиҷҹеӨұж•—");resolve(false);});});}

// Optimistic UI tracking вҖ” items currently in flight to Firebase.
// _pendingItems is ref-counted (Map<id, count>) because multiple concurrent doAction calls on the same item id used to delete the entry after the first tx completed,
// causing the listener to fall back to server values mid-batch and flicker the row's q.
// has(id) / size are kept as Map-equivalent reads so existing call sites don't need to change.
const _pendingItems=new Map();
_pendingItems.bump=function(id){this.set(id,(this.get(id)||0)+1);};
_pendingItems.drop=function(id){const n=(this.get(id)||0)-1;if(n<=0)this.delete(id);else this.set(id,n);};
const _pendingDeletes=new Set();
// True while user has a drag in progress вҖ” listenerRender skips so the row being dragged isn't yanked out from under the browser's drag image
let _isDragging=false;

// Throttled render for listener-triggered updates вҖ” coalesces multi-user broadcasts.
// 50ms was too aggressive when 3 users were bulk-editing simultaneously (kept thrashing CPU). 180ms still feels live to a human eye but groups bursts.
let _listenerRenderTimer=null;
function listenerRender(){if(_listenerRenderTimer)return;_listenerRenderTimer=setTimeout(()=>{_listenerRenderTimer=null;render();},180);}
// Module-level debounce timers for search inputs. Previously each renderMain call recreated a closure-local `searchTimer`, so a listener-triggered re-render would orphan the previous timer вҖ” it would fire afterward and write a stale value back into S.search, flickering whatever the user had typed in between. Hoisting them makes clearTimeout actually catch the previous timer.
let _searchTimer=null,_logSearchTimer=null;

// Real-time sync: listen for changes from other users
let fbListening=false;
async function startRealtimeSync(){
  if(fbListening)return;fbListening=true;
  await authReady;
  // Connection status вҖ” writes only reach Firebase when online
  // Toast on disconnect/reconnect вҖ” but skip the first ~3s of subscriber events so the initial connection handshake doesn't fire spurious notifications
  const _connStart=Date.now();
  let _hadOffline=false;
  db.ref(".info/connected").on("value",snap=>{
    const online=!!snap.val();if(S.online===online)return;S.online=online;
    const stable=(Date.now()-_connStart)>3000;
    if(!online)_hadOffline=true;
    if(stable){
      if(online&&_hadOffline){showToast("вң… е·ІйҮҚж–°йҖЈз·ҡпјҢеҗҢжӯҘдёӯвҖҰ");_hadOffline=false;}
      else if(!online)showToast("вҡ  йҖЈз·ҡдёӯж–·пјҢдҝ®ж”№жңғжҺ’йҡҠ");
    }
    if(S.phase==="ready"&&!S.modal&&document.activeElement?.tagName!=="INPUT"&&document.activeElement?.tagName!=="TEXTAREA")listenerRender();
  });
  // Don't re-render if a modal is open, the user is typing, the tab is hidden, or a drag is mid-flight (rebuilding DOM aborts the browser's drag operation).
  // document.hidden skip cuts CPU/battery while the app sits backgrounded вҖ” on visibilitychange we kick a fresh render so the user sees the latest state immediately when they switch back.
  const canRender=()=>{const t=document.activeElement?.tagName;return !S.modal&&!_isDragging&&!document.hidden&&t!=="INPUT"&&t!=="TEXTAREA";};
  document.addEventListener("visibilitychange",()=>{if(!document.hidden&&S.phase==="ready")listenerRender();});
  dbI.on("value",snap=>{const remote=arrFromVal(snap.val());if(!remote||!S.items)return;
    // Reconcile remote with optimistic state вҖ” preserve pending items, drop pending deletes
    let merged=remote.filter(x=>x);
    if(_pendingItems.size){
      merged=merged.map(r=>{if(_pendingItems.has(r.id)){const local=S.items.find(x=>x.id===r.id);if(local)return local;}return r;});
      const remoteIds=new Set(merged.map(x=>x.id));
      S.items.forEach(x=>{if(_pendingItems.has(x.id)&&!remoteIds.has(x.id))merged.push(x);});
    }
    if(_pendingDeletes.size)merged=merged.filter(x=>!_pendingDeletes.has(x.id));
    const sig=arr=>JSON.stringify(arr.map(x=>x&&[x.id,x.q,x.n,x.b,x.c,x.z,x.img||"",x.dsc||""]));
    const prev=sig(S.items),next=sig(merged);
    if(prev!==next){
      S.items=merged;
      S.lastSyncAt=Date.now();
      // Prune _sel of items that no longer exist remotely вҖ” otherwise the "е·ІйҒё N" count keeps phantom ids that another user has already deleted, and bulk operations would write log entries for non-existent items.
      if(S._sel&&S._sel.size){
        const liveIds=new Set(merged.map(x=>x.id));
        S._sel=new Set([...S._sel].filter(id=>liveIds.has(id)));
      }
      saveCache();
      if(canRender())listenerRender();
    }
  });
  dbL.limitToFirst(200).on("value",snap=>{const remote=arrFromVal(snap.val());
    if(!remote)return;
    // Phase guard: after logout the listener can still fire if the dbL subscription is alive вҖ” without this we'd repopulate S.logs while user is on the login screen and the next login would see stale state from the previous session for a frame.
    if(S.phase!=="ready"||!S.items)return;
    let cleanRemote=remote.filter(x=>x);
    // Preserve any locally-added logs whose appendLog() hasn't yet committed вҖ” without this they briefly disappear from the UI between our local push and Firebase round-trip
    if(_pendingLogs.size){
      const remoteIds=new Set(cleanRemote.map(l=>l.id));
      const pendingLocal=S.logs.filter(l=>_pendingLogs.has(l.id)&&!remoteIds.has(l.id));
      if(pendingLocal.length)cleanRemote=[...pendingLocal,...cleanRemote].slice(0,500);
    }
    const prev=S.logs.length?S.logs[0].id:null;
    const next=cleanRemote.length?cleanRemote[0].id:null;
    if(prev!==next||cleanRemote.length!==S.logs.length){S.logs=cleanRemote;saveCache();if(canRender())listenerRender();}
  });
  // catOrd sync: when another user reorders, reflect it
  dbO.on("value",snap=>{const remote=snap.val();if(!remote||typeof remote!=="object")return;
    const prev=JSON.stringify(S.catOrd),next=JSON.stringify(remote);
    if(prev!==next){S.catOrd=remote;if(canRender())listenerRender();}
  });
}


async function doAction(type,it,qty,note){
  const back=S.modal&&S.modal.back||null;
  const amt=Math.max(type==="audit"?0:1,qty);
  const idx=S.items.findIndex(x=>x.id===it.id);
  if(idx<0){S.modal=back;showToast("вҡ  жӯӨе“Ғй …е·Іиў«еҲӘйҷӨ");render();return {ok:false};}
  const orig=S.items[idx],rq=orig.q||0;
  if(type==="out"&&rq<=0){S.modal=back;showToast("вҡ  еә«еӯҳзӮә 0пјҢз„Ўжі•еҮәиІЁ");render();return {ok:false};}
  const oa=type==="out"?Math.min(rq,amt):amt;
  const optNq=type==="in"?rq+amt:type==="out"?Math.max(0,rq-oa):Math.max(0,amt);
  if(type==="audit"&&optNq===rq){S.modal=back;showToast("ж•ёйҮҸзӣёеҗҢпјҢз„ЎйңҖзӣӨй»һ");render();return {ok:false};}
  // Optimistic: update locally, close modal, show toast вҖ” instant UI feedback
  _pendingItems.bump(it.id);
  S.items=[...S.items.slice(0,idx),{...orig,q:optNq},...S.items.slice(idx+1)];
  const det=note?(note+(type==="in"?"+"+amt:type==="out"?"-"+oa:"")):(type==="in"?"+"+amt:type==="out"?"-"+oa:"зӣӨй»һ "+rq+"вҶ’"+optNq);
  const logEntry={id:uid(),iid:it.id,u:S.user,t:ts(),a:type==="in"?"рҹ“ҘйҖІиІЁ":type==="out"?"рҹ“ӨеҮәиІЁ":"рҹ“ӢзӣӨй»һ",n:it.n,b:it.b,d:det,pq:rq,nq:optNq};
  pushLogLocal(logEntry);
  S.modal=back;
  const diff=optNq-rq;const diffStr=type==="audit"?(diff===0?"":" ("+(diff>0?"+":"")+diff+")"):"";
  try{navigator.vibrate&&navigator.vibrate(30);}catch(e){}
  // Undo only for in/out (where reverse action is unambiguous server-relative). Audit absolute-set has no clean inverse.
  // Undo flag prevents recursive undo (the "(ж’ӨйҠ·)" action shouldn't itself offer another undo).
  const undoOpts=(!note||note.indexOf("(ж’ӨйҠ·)")<0)&&(type==="in"||type==="out")?{
    label:"вҶ¶ ж’ӨйҠ·",
    // If the user logged out while the toast was still on screen, S.items is null and a naive .find throws TypeError вҖ” bail out cleanly.
    fn:()=>{if(!S.items){showToast("вҡ  е·Ізҷ»еҮәпјҢз„Ўжі•ж’ӨйҠ·");return;}const opp=type==="in"?"out":"in";const cur=S.items.find(x=>x.id===it.id);if(!cur){showToast("вҡ  жӯӨе“Ғй …е·Іиў«еҲӘйҷӨ");return;}doAction(opp,cur,oa,"(ж’ӨйҠ·)");}
  }:null;
  showToast((type==="in"?"рҹ“Ҙ":type==="out"?"рҹ“Ө":"рҹ“Ӣ")+" "+it.n+" "+rq+"вҶ’"+optNq+diffStr,undoOpts);
  render();
  // Background sync вҖ” relative for in/out (concurrent-safe), absolute for audit
  let serverRq=rq,serverNq=optNq,failReason=null;
  try{
    const tx=await fbTxItem(it.id,cur=>{
      serverRq=cur.q||0;
      if(type==="in"){serverNq=serverRq+amt;return{...cur,q:serverNq};}
      if(type==="out"){if(serverRq<=0)return undefined;const o=Math.min(serverRq,amt);serverNq=Math.max(0,serverRq-o);return{...cur,q:serverNq};}
      serverNq=Math.max(0,amt);return{...cur,q:serverNq};
    });
    if(tx.missing)failReason="вҡ  жӯӨе“Ғй …е·Іиў«еҲӘйҷӨ";
    else if(!tx.committed)failReason="вҡ  еҗҢжӯҘеӨұж•—пјҢи«ӢйҮҚи©Ұ";
  }catch(e){console.error(e);failReason="вҡ  йҖЈз·ҡйҢҜиӘӨ";}
  _pendingItems.drop(it.id);
  // If the user logged out while this tx was in flight, S.items is null. Bail out cleanly instead of throwing on S.items.findIndex.
  if(!S.items)return {ok:!failReason};
  if(failReason){
    if(failReason==="вҡ  жӯӨе“Ғй …е·Іиў«еҲӘйҷӨ")S.items=S.items.filter(x=>x.id!==it.id);
    else{const i2=S.items.findIndex(x=>x.id===it.id);if(i2>=0)S.items=[...S.items.slice(0,i2),{...S.items[i2],q:rq},...S.items.slice(i2+1)];}
    dropLogLocal(logEntry.id);
    saveCache();showToast(failReason);render();
    return {ok:false};
  }
  // Reconcile to server result (handles concurrent edits).
  // Skip if another doAction on the same item is still in flight вҖ” its later tx has the more up-to-date server view, and overwriting q here would visibly flicker the row.
  const stillPending=_pendingItems.has(it.id);
  const i2=S.items.findIndex(x=>x.id===it.id);
  if(!stillPending&&i2>=0&&S.items[i2].q!==serverNq){
    S.items=[...S.items.slice(0,i2),{...S.items[i2],q:serverNq},...S.items.slice(i2+1)];
    render();
  }
  if(serverRq!==rq||serverNq!==optNq){
    const lIdx=S.logs.findIndex(l=>l.id===logEntry.id);
    if(lIdx>=0){
      const fixedOa=type==="out"?Math.min(serverRq,amt):oa;
      const fixedDet=note?(note+(type==="in"?"+"+amt:type==="out"?"-"+fixedOa:"")):(type==="in"?"+"+amt:type==="out"?"-"+fixedOa:"зӣӨй»һ "+serverRq+"вҶ’"+serverNq);
      S.logs[lIdx]={...logEntry,pq:serverRq,nq:serverNq,d:fixedDet};
      saveCache();
    }
  }
  appendLog(S.logs.find(l=>l.id===logEntry.id)||logEntry);
  return {ok:true};
}
function normalizeImgUrl(url){
  if(!url)return "";
  url=url.trim();
  // Google Drive: file/d/{id}/view, open?id={id}, /uc?export=view&id={id} вҶ’ lh3 direct
  const gdMatch=url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?(?:[^&]*&)*id=)([A-Za-z0-9_-]{20,})/);
  if(gdMatch)return "https://lh3.googleusercontent.com/d/"+gdMatch[1]+"=w800";
  // imgur share page вҶ’ i.imgur direct (legacy 5/7 char IDs and newer 8+ char IDs)
  const imgurMatch=url.match(/^https?:\/\/(?:www\.)?imgur\.com\/(?:gallery\/|a\/)?([A-Za-z0-9]{5,10})(?:[?#].*)?$/);
  if(imgurMatch)return "https://i.imgur.com/"+imgurMatch[1]+".jpg";
  return url;
}

  if(!S.items)return;

    msg.textContent="";

    const oldRec=S.users&&S.users[target]||{};
    const pwChanged=np.length>0&&(oldRec.pass||"")!==np;

    // Previously required password every time even when admin only wanted to flip the role вҖ” forced admins to look up the current pass before demoting. Allow empty newI to mean "keep password unchanged".
    if(!pwChanged&&!roleChanged){msg.textContent="вҡ  жІ’жңүи®Ҡжӣҙ";return;}
    // Last-admin guard: don't allow demoting if this would leave 0 admins
    if(oldRec.role==="admin"&&roleSel.value!=="admin"){
      const adminCount=Object.values(S.users||{}).filter(u=>u.role==="admin").length;
      if(adminCount<=1){msg.textContent="вҡ  зі»зөұиҮіе°‘иҰҒжңүдёҖеҖӢз®ЎзҗҶе“Ў";return;}
    }
    this.disabled=true;this.textContent="е„ІеӯҳдёӯвҖҰ";
    const patch={role:roleSel.value};
    if(pwChanged)patch.pass=np;
    const ok=await fbSetUserField(target,patch);
    if(!ok){msg.textContent="вҡ  е„ІеӯҳеӨұж•—";this.disabled=false;this.textContent="рҹ’ҫ е„Іеӯҳ";return;}
    if(target===S.user){
      if(pwChanged){try{localStorage.setItem("inv_pass",np);}catch(e){}}
      // Self role change must propagate locally too вҖ” admin demoting themselves shouldn't keep admin UI
      S.role=roleSel.value;
    }
    // Differentiate audit-log entries so the activity log shows what actually changed instead of always "ж”№еҲҘдәәеҜҶзўј".
    let actLog="";
    if(pwChanged&&roleChanged)actLog="ж”№еҲҘдәәеҜҶзўј+ж¬Ҡйҷҗ";
    else if(pwChanged)actLog="ж”№еҲҘдәәеҜҶзўј";

    back();
  };
  box.appendChild(saveBtn);
  return h("div",{className:"modal-bg"},h("div",{className:"modal-overlay",onClick:back}),box);
}

// Top-level bulk move so the modal (outside renderMain's drag-handler scope) can invoke it. Mirrors moveItems but takes a Set of ids вҖ” single dbI.transaction touches all affected entries, then writes one summary log so the audit trail stays compact.
async function bulkMoveItems(ids,patch,description){
  return new Promise(resolve=>{
    let lastAffected=[];
    dbI.transaction(cur=>{
      const arr=arrFromVal(cur);
      if(!arr)return cur;
      lastAffected=arr.filter(x=>x&&ids.has(x.id));
      let changed=false;
      const next=arr.map(x=>{if(x&&ids.has(x.id)){changed=true;return{...x,...patch};}return x;});
      return changed?next:arr;
    },(err,committed,snap)=>{
      if(err){console.error("bulkMoveItems failed:",err);showToast("вҡ  жҗ¬з§»еӨұж•—");resolve(false);return;}
      const a=arrFromVal(snap&&snap.val());
      if(a&&S.items){S.items=mergeWithPending(a.filter(x=>x));saveCache();}
      if(committed&&lastAffected.length){
        // Auto-expand destination so the moved items are immediately visible вҖ” without this users see the source row vanish and might think the items were deleted.
        const newZ=patch.z||lastAffected[0].z||"еә—е…§";
        const zonePrefix=newZ==="еҖүеә«"?"W":"S";
        const newB=patch.b||lastAffected[0].b;
        const newC=patch.c||lastAffected[0].c;
        if(newB){S.bOpen[zonePrefix+newB]=true;if(newC)S.cOpen[zonePrefix+newB+"|"+newC]=true;}
        const totalQ=lastAffected.reduce((s,x)=>s+(x.q||0),0);
        const sample=lastAffected.slice(0,3).map(x=>x.n).join("гҖҒ");
        const summaryName=lastAffected.length===1?lastAffected[0].n:(sample+(lastAffected.length>3?(" зӯү "+lastAffected.length+" й …"):""));
        const newBrand=patch.b||lastAffected[0].b;
        const logEntry={id:uid(),iid:lastAffected[0].id,u:S.user,a:"вңҸпёҸжҗ¬з§»",n:summaryName,b:newBrand,d:description,pq:totalQ,nq:totalQ,t:ts()};
        pushLogLocal(logEntry);appendLog(logEntry);
      }
      render();
      resolve(committed);
    },false);
  });
}

function genExportText(zone,selDate){
  const today=new Date();const td=today.getFullYear()+"/"+String(today.getMonth()+1).padStart(2,"0")+"/"+String(today.getDate()).padStart(2,"0");
  // Use selected date or today
  const targetDate=selDate?selDate.replace(/-/g,"/"):td;
  const dlabel=targetDate.replace(/^\d{4}\//,"");
  let all="";
  // Filter logs to this zone. Match by iid where available so duplicate names across zones don't cross-contaminate
  // (e.g. STAGEPAS 100BTR exists in store, STAGEPAS 100BTR(еҖү) in warehouse вҖ” no overlap; but custom-added duplicates would).
  const zoneIds=new Set(S.items.filter(x=>(x.z||"еә—е…§")===zone).map(x=>x.id));
  const zoneNames=new Set(S.items.filter(x=>(x.z||"еә—е…§")===zone).map(x=>x.n));
  const inZone=l=>l.iid?zoneIds.has(l.iid):zoneNames.has(l.n);
  // Logs for selected date, filtered by zone
  const inLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&((l.a||"").includes("йҖІиІЁ")||(l.a||"").includes("вһ•")));
  const outLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&(l.a||"").includes("еҮәиІЁ"));
  const auLogs=S.logs.filter(l=>dateOnly(l.t)===targetDate&&inZone(l)&&(l.a||"").includes("зӣӨй»һ"));
  if(inLogs.length){all+=dlabel+" йҖІиІЁ\n==================\n";inLogs.forEach(l=>{const tag=(l.a||"").includes("вһ•")?"ж–°еўһ":"";all+=l.n+" "+(tag||(l.d||""))+" "+l.pq+"вҶ’"+l.nq+" ("+l.u+")\n";});all+="\n";}
  if(outLogs.length){all+=dlabel+" еҮәиІЁ\n==================\n";outLogs.forEach(l=>{all+=l.n+" "+(l.d||"")+" "+l.pq+"вҶ’"+l.nq+" ("+l.u+")\n";});all+="\n";}
  if(auLogs.length){all+=dlabel+" зӣӨй»һ\n==================\n";auLogs.forEach(l=>{all+=l.n+" "+l.pq+"вҶ’"+l.nq+" ("+l.u+")\n";});all+="\n";}
  // Stock report
  const zoneItems=S.items.filter(x=>(x.z||"еә—е…§")===zone);
  if(zone==="еҖүеә«"){
    const brands=[...new Set(zoneItems.map(x=>x.b))].sort();
    brands.forEach(b=>{
      const bi=zoneItems.filter(x=>x.b===b);
      if(!bi.length)return;
      all+=dlabel+" "+b+" еҖүеә«еә«еӯҳжӣҙж–°\n==================\n";
      const cg={};bi.forEach(x=>{if(!cg[x.c])cg[x.c]=[];cg[x.c].push(x);});
      Object.keys(cg).forEach(c=>{all+=c+"\n";cg[c].forEach(x=>all+=x.n+" x"+x.q+"\n");all+="вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”\n";});
      all+="\n";
    });
  }else{
    const tpls=[{t:"aNN еә«еӯҳжӣҙж–°",b:"aNueNue"},{t:"Veelah/Singer еә«еӯҳжӣҙж–°",b:["Veelah","Singer"]},{t:"D'a XSеә«еӯҳжӣҙж–°",b:"D'Addario"},{t:"Elixirеә«еӯҳжӣҙж–°",b:"Elixir"},{t:"NUX еә«еӯҳжӣҙж–°",b:"NUX"},{t:"йҹіз®ұеә«еӯҳжӣҙж–°",b:"е…¶д»–йҹіз®ұ"},{t:"Yamaha еә«еӯҳжӣҙж–°",b:"Yamaha"}];
    const coveredBrands=new Set();tpls.forEach(tpl=>{const bs=Array.isArray(tpl.b)?tpl.b:[tpl.b];bs.forEach(b=>coveredBrands.add(b));});

      bar.appendChild(h("button",{style:{padding:"7px 10px",borderRadius:"8px",border:"1px solid var(--border)",background:"#fff",color:"var(--sub)",fontSize:"11px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"},onClick:()=>{S._sel=null;render();}},"жё…йҷӨ"));
    }
    bar.appendChild(h("div",{style:{flex:1}}));
    if(selSize>0){
      bar.appendChild(h("button",{style:{padding:"7px 12px",borderRadius:"8px",border:"1px solid var(--blue)",background:"#fff",color:"var(--blue)",fontSize:"12px",cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"},onClick:()=>{S.modal={t:"bulk-move",ids:[...S._sel]};render();}},"рҹ“Ұ жҗ¬еҲ°вҖҰ"));
      bar.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"8px",border:"none",background:"var(--red)",color:"#fff",fontSize:"12px",cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"},onClick:()=>{if(S._sel&&S._sel.size)S.modal={t:"bulk-del-confirm",ids:[...S._sel]};render();}},"рҹ—‘ еҲӘйҷӨ "+selSize));
    }
    bar.appendChild(h("button",{style:{padding:"7px 10px",borderRadius:"8px",border:"1px solid var(--border)",background:"#fff",color:"var(--sub)",fontSize:"11px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"},onClick:()=>{S._selectMode=false;S._sel=null;render();}},"йҖҖеҮә"));
    root.appendChild(bar);
    // Ensure the bottom rows aren't covered by the fixed bar (which can be 1-2 rows tall with flex-wrap on narrow viewports).
    content.style.paddingBottom="120px";
  }
  return root;
}

let _bodyLockY=0;
function lockBody(){if(document.body.dataset.locked==="1")return;_bodyLockY=window.scrollY||document.documentElement.scrollTop||0;document.body.dataset.locked="1";document.body.style.position="fixed";document.body.style.top=(-_bodyLockY)+"px";document.body.style.width="100%";document.body.style.overflow="hidden";}
function unlockBody(){if(document.body.dataset.locked!=="1")return;document.body.dataset.locked="";document.body.style.position="";document.body.style.top="";document.body.style.width="";document.body.style.overflow="";window.scrollTo(0,_bodyLockY);}
// Coalesce multiple sync render() calls into one вҖ” saves redundant rebuilds when listeners fire together.
// Also clears any pending listenerRender timer вҖ” if user actions trigger render() directly, no need to redraw again 180ms later from the same update.
let _renderQueued=false;
function render(){if(_renderQueued)return;_renderQueued=true;if(_listenerRenderTimer){clearTimeout(_listenerRenderTimer);_listenerRenderTimer=null;}queueMicrotask(()=>{_renderQueued=false;try{_render();}catch(e){console.error("render failed:",e);
    // If _render threw mid-flight, body may be left in fixed/locked state from a previous open modal, leaving the user unable to scroll until reload.
    try{unlockBody();}catch(e2){/* swallow */}
    showToast("вҡ  з•«йқўжӣҙж–°еӨұж•—пјҢи«ӢйҮҚж–°ж•ҙзҗҶй Ғйқў");
  }});}
function _render(){
  const a=document.getElementById("app");
  const wasLocked=document.body.dataset.locked==="1";
  const sy=wasLocked?_bodyLockY:(window.scrollY||document.documentElement.scrollTop||0);
  const skipRestore=S._skipScrollRestore;S._skipScrollRestore=false;
  // еңЁ wipe DOM д№ӢеүҚжҠ“дҪҸ focus зӢҖж…Ӣпјҡinput id + cursor + selectionгҖӮж–° DOM е»әеҘҪеҫҢйҮҚж–° focus еҗҢ id зҡ„е…ғзҙ дёҰйӮ„еҺҹ cursorгҖӮ
  // д№ӢеүҚ search жЎҶзҡ„ focus restore жҳҜеңЁ render() еҫҢеҗҢжӯҘеҹ·иЎҢпјҢдҪҶ render з”Ё queueMicrotask жҳҜ async вҖ” focus и·‘еҲ°гҖҢеҚіе°Үиў« wipe зҡ„иҲҠе…ғзҙ гҖҚпјҢз„¶еҫҢйҰ¬дёҠж¶ҲеӨұгҖӮtyping еҚЎдҪҸзҡ„е…ғе…ҮгҖӮ
  const af=document.activeElement;
  const focusInfo=(af&&af.id&&(af.tagName==="INPUT"||af.tagName==="TEXTAREA")&&a.contains(af))?{id:af.id,start:af.selectionStart,end:af.selectionEnd}:null;
  a.innerHTML="";
  if(S.phase==="login")a.appendChild(renderLogin());
  else if(S.phase==="loading"||!S.items)a.appendChild(renderLoading());
  else a.appendChild(renderMain());
  if(focusInfo){
    const el=document.getElementById(focusInfo.id);
    if(el){
      el.focus();
      try{el.setSelectionRange(focusInfo.start,focusInfo.end);}catch(e){/* number input зӯүдёҚж”ҜжҸҙ setSelectionRange */}
    }
  }
  if(S.modal){if(!wasLocked){_bodyLockY=sy;lockBody();}}
  else{if(wasLocked)unlockBody();if(skipRestore)requestAnimationFrame(()=>window.scrollTo(0,0));else if(sy>0)requestAnimationFrame(()=>window.scrollTo(0,sy));}
}
// Global keyboard shortcuts. Esc closes modal; '/' focuses search; 'n' opens add modal; 1-4 switches tab.
// All shortcuts are skipped while user is typing in an input/textarea so nothing fires from a passing keystroke.
document.addEventListener("keydown",e=>{
  // Enter on login screen submits even when no focus on the button
  if(S.phase==="login"&&e.key==="Enter"&&!e.isComposing&&e.keyCode!==229){const btn=document.getElementById("loginBtn");if(btn&&!btn.disabled){e.preventDefault();btn.click();}return;}
  if(e.key==="Escape"&&S.modal){if(S.modal.t==="detail"&&S.modal.edit)return;S.modal=S.modal.back||S.modal.fromModal||null;render();return;}
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const tag=e.target&&e.target.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||tag==="BUTTON")return;
  if(e.target&&e.target.isContentEditable)return;
  if(S.phase!=="ready"||S.modal)return;
  if(e.key==="/"){const sb=document.getElementById("searchBox")||document.getElementById("logSearch");if(sb){e.preventDefault();sb.focus();sb.select();}}
  else if((e.key==="n"||e.key==="N")&&!isPreview()){e.preventDefault();S.modal={t:"add"};render();}
  else if(e.key>="1"&&e.key<="4"){const tabs=["store","warehouse","log","stats"];const t=tabs[parseInt(e.key)-1];if(t&&S.tab!==t){e.preventDefault();S.tab=t;S._skipScrollRestore=true;render();}}
});
// Refresh sync label without rebuilding DOM вҖ” full render every minute thrashes input focus, scrolling state, etc.
setInterval(()=>{
  if(S.phase!=="ready"||document.hidden)return;
  const el=document.getElementById("syncLabel");
  if(!el||!S.lastSyncAt)return;
  const diffSec=Math.floor((Date.now()-S.lastSyncAt)/1000);
  let label;
  if(diffSec<10)label="еүӣеүӣ";
  else if(diffSec<60)label=diffSec+"з§’еүҚ";
  else if(diffSec<3600)label=Math.floor(diffSec/60)+"еҲҶеүҚ";
  else if(diffSec<86400)label=Math.floor(diffSec/3600)+"жҷӮеүҚ";
  else label=Math.floor(diffSec/86400)+"еӨ©еүҚ";
  if(el.textContent!==label)el.textContent=label;
  el.style.color=diffSec>3600?"var(--orange)":"var(--sub)";
},30000);
render();
</script>
