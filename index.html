*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d13;font-family:'Noto Sans TC',system-ui,sans-serif;color:#e2e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#222839;border-radius:9px}
select option{background:#12151e;color:#e2e8f0}input::placeholder{color:#475569}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.ipt{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #222839;background:#191d28;color:#e2e8f0;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box}
.row{display:flex;align-items:center;gap:5px;padding:5px 10px 5px 30px;border-bottom:1px solid #222839}
.qbtn{padding:3px 7px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.modal-bg{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.modal-box{position:relative;background:#12151e;border-radius:14px;padding:22px 26px;width:92%;max-width:420px;border:1px solid #222839;max-height:90vh;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:9999;animation:toastIn .3s ease;white-space:nowrap}
.tag-btn{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.num-btn{padding:8px 0;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.export-box{background:#191d28;border:1px solid #222839;border-radius:10px;padding:14px;white-space:pre-wrap;font-size:12px;color:#94a3b8;max-height:60vh;overflow-y:auto;font-family:'Noto Sans TC',monospace;line-height:1.6}

function generateExport(items){
  const d=dateStr();let all="";
  EXPORT_TEMPLATES.forEach(tpl=>{
    const brands=Array.isArray(tpl.brand)?tpl.brand:[tpl.brand];
    const filtered=items.filter(x=>brands.includes(x.b));
    if(!filtered.length)return;
    all+=d+" "+tpl.title+"\n==================\n";
    all+=tpl.format(filtered);
    all+="\n\n";
  });
  return all.trim();
}

async function fbLoad(){
  try{
    const timeout=ms=>new Promise((_,rej)=>setTimeout(()=>rej("timeout"),ms));
    const[iS,lS,oS]=await Promise.race([Promise.all([dbItems.once("value"),dbLogs.once("value"),dbOrder.once("value")]),timeout(8000)]);
    const i=iS.val(),l=lS.val(),o=oS.val();
    S.items=(i&&Array.isArray(i)&&i.length>0)?i:mkInit();
    if(!i||!Array.isArray(i)||i.length===0)dbItems.set(S.items);
    S.logs=Array.isArray(l)?l:[];
    S.catOrd=(o&&typeof o==="object")?o:{};
  }catch(e){console.error("fbLoad:",e);S.items=mkInit();S.logs=[];try{dbItems.set(S.items);}catch(e2){}}
}
function fbSI(){dbItems.set(S.items).catch(e=>console.error(e));}
function fbSL(){dbLogs.set(S.logs).catch(e=>console.error(e));}

function doAction(type,it,qty,note){
  const cur=S.items.find(x=>x.id===it.id);if(!cur)return;
  const rq=cur.q,amt=Math.max(type==="audit"?0:1,qty);
  if(type==="out"&&rq<=0)return;
  const oa=type==="out"?Math.min(rq,amt):amt;
  let nq;if(type==="in")nq=rq+amt;else if(type==="out")nq=Math.max(0,rq-oa);else nq=Math.max(0,amt);
  S.items=S.items.map(x=>x.id===it.id?{...x,q:nq}:x);
  const det=note?(note+(type==="in"?"+"+amt:type==="out"?"-"+oa:"")):(type==="in"?"+"+amt:type==="out"?"-"+oa:rq+"→"+nq);
  S.logs=[{id:uid(),u:S.user,t:ts(),a:type==="in"?"📥進貨":type==="out"?"📤出貨":"📋盤點",n:it.n,d:det,pq:rq,nq},...S.logs].slice(0,500);
  fbSI();fbSL();S.modal=null;showToast((type==="in"?"📥":"📤")+" "+it.n+" "+rq+"→"+nq);render();
}
